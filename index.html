<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DC MUSIC - Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
</head>
<body>
    <!-- Premium Welcome Screen (Full Takeover) -->
    <div id="welcomeOverlay" class="welcome-overlay">
        <div class="welcome-card">
            <div class="nano-logo">DC</div>
            <h1>Premium Sound.</h1>
            <p>Experience high-bass, cloud-synced music with our advanced DSA recommendation engine.</p>
            <div class="auth-buttons">
                <button class="auth-btn google" onclick="googleSignIn()">
                    <i data-lucide="log-in"></i> Sign in with Google
                </button>
                <button class="auth-btn guest" onclick="closeWelcome()">
                    Continue as Guest
                </button>
            </div>
        </div>
    </div>

    <div id="app" class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="nano-logo">DC</div>
                <span>MUSIC</span>
            </div>
            
            <nav class="nav-links">
                <div>
                    <p class="nav-label">MENU</p>
                    <a href="#" class="nav-item active" data-view="home"><i data-lucide="play-circle"></i> Listen Now</a>
                    <a href="#" class="nav-item" data-view="browse"><i data-lucide="layout-grid"></i> Browse</a>
                    <a href="#" class="nav-item" data-view="search"><i data-lucide="search"></i> Search</a>
                </div>
                <div style="margin-top:40px;">
                    <p class="nav-label">LIBRARY</p>
                    <a href="#" class="nav-item" data-view="library"><i data-lucide="library"></i> My Playlist</a>
                    <a href="#" class="nav-item" id="automixBtn"><i data-lucide="zap"></i> Automix AI</a>
                </div>
            </nav>

            <div class="user-profile-bar">
                <div class="user-profile" id="userProfile">
                    <i data-lucide="user"></i>
                </div>
                <div class="user-text">
                    <p id="userName">Guest User</p>
                    <span>Premium Member</span>
                </div>
            </div>
        </aside>

        <!-- Main -->
        <main class="main-content">
            <header class="main-header">
                <div class="header-search">
                    <i data-lucide="search"></i>
                    <input type="text" placeholder="Artists, Songs, Lyrics" id="topSearch">
                </div>
            </header>
            <section id="content-area"></section>
        </main>

        <!-- Player -->
        <footer class="player-bar">
            <div class="now-playing">
                <img id="currentArt" src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=200">
                <div class="track-info">
                    <h4 id="currentTitle">Not Playing</h4>
                    <p id="currentArtist">Select music</p>
                </div>
                <button id="likeBtn" class="icon-btn"><i data-lucide="heart"></i></button>
            </div>

            <div class="player-controls">
                <div class="control-btns">
                    <button id="prevBtn" class="icon-btn"><i data-lucide="skip-back"></i></button>
                    <button class="play-btn" id="playPauseBtn"><i data-lucide="play"></i></button>
                    <button id="nextBtn" class="icon-btn"><i data-lucide="skip-forward"></i></button>
                </div>
                <div class="progress-container">
                    <span id="curTime">0:00</span>
                    <div class="progress-bar-wrapper">
                        <input type="range" id="progBar" min="0" max="100" value="0">
                        <div id="progFill" class="progress-fill"></div>
                    </div>
                    <span id="durTime">0:00</span>
                </div>
            </div>

            <div class="audio-engine-controls">
                <div class="vol-group">
                    <i data-lucide="volume-2" id="volIcon"></i>
                    <input type="range" id="volSlide" min="0" max="100" value="100">
                </div>
                <div class="boost-panel">
                    <div class="boost-item">
                        <label>BASS</label>
                        <input type="range" id="bssSlide" min="0" max="30" value="0">
                    </div>
                    <div class="boost-item">
                        <label>BOOST</label>
                        <input type="range" id="bstSlide" min="1" max="10" step="0.5" value="1">
                    </div>
                    <div class="boost-val" id="volLvl">100%</div>
                </div>
            </div>
        </footer>

        <!-- Mobile Nav -->
        <nav class="mobile-nav">
            <a href="#" class="nav-item-m active" data-view="home"><i data-lucide="play-circle"></i><span>Listen</span></a>
            <a href="#" class="nav-item-m" data-view="library"><i data-lucide="library"></i><span>Library</span></a>
            <a href="#" class="nav-item-m" data-view="search"><i data-lucide="search"></i><span>Search</span></a>
        </nav>
    </div>

    <div id="yt-hidden-player" style="position:fixed; top:-999px;"></div>
    <div class="dynamic-bg"></div>
    <script src="main.js"></script>
</body>
</html>
