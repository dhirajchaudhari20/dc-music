<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DC MUSIC - Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
</head>
<body>
    <!-- Premium Welcome Screen -->
    <div id="welcomeOverlay" class="welcome-overlay">
        <div class="welcome-card">
            <div class="nano-logo">DC</div>
            <h1>Premium Sound.</h1>
            <p>Experience high-bass, cloud-synced music with our advanced DSA recommendation engine.</p>
            <div class="auth-buttons">
                <button class="auth-btn google" onclick="googleSignIn()">
                    Sign in with Google
                </button>
                <button class="auth-btn guest" onclick="closeWelcome()">
                    Continue as Guest
                </button>
            </div>
        </div>
    </div>

    <div id="app" class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="nano-logo">DC</div>
                <span>MUSIC</span>
            </div>
            
            <nav class="nav-links">
                <div>
                    <a href="#" class="nav-item active" data-view="home"><i data-lucide="play-circle"></i> Listen Now</a>
                    <a href="#" class="nav-item" data-view="browse"><i data-lucide="layout-grid"></i> Browse</a>
                    <a href="#" class="nav-item" data-view="search"><i data-lucide="search"></i> Search</a>
                </div>
            </nav>
        </aside>

        <!-- Main -->
        <main class="main-content">
            <header style="display:flex; justify-content:flex-end; margin-bottom:20px;">
                <div class="user-profile" style="width:36px; height:36px; background:#2c2c2e; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center;">
                    <i data-lucide="user"></i>
                </div>
            </header>
            <section id="content-area"></section>
        </main>

        <!-- Player -->
        <footer class="player-bar">
            <div class="now-playing">
                <img id="currentArt" src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=200">
                <div class="track-info">
                    <h4 id="currentTitle" style="font-size:14px; font-weight:600;">Not Playing</h4>
                    <p id="currentArtist" style="font-size:12px; color:#8e8e93;">Select music</p>
                </div>
            </div>

            <div class="player-controls">
                <div class="control-btns">
                    <button id="prevBtn" style="background:none; border:none; color:white; cursor:pointer;"><i data-lucide="skip-back"></i></button>
                    <button class="play-btn" id="playPauseBtn"><i data-lucide="play"></i></button>
                    <button id="nextBtn" style="background:none; border:none; color:white; cursor:pointer;"><i data-lucide="skip-forward"></i></button>
                </div>
                <div style="width:100%; display:flex; align-items:center; gap:10px;">
                    <span id="curTime" style="font-size:10px; color:#8e8e93; min-width:30px;">0:00</span>
                    <input type="range" id="progBar" min="0" max="100" value="0" style="flex-grow:1;">
                    <span id="durTime" style="font-size:10px; color:#8e8e93; min-width:30px;">0:00</span>
                </div>
            </div>

            <div class="vol-controls desktop-only" style="width:250px; display:flex; align-items:center; gap:15px; justify-content:flex-end;">
                <i data-lucide="volume-2" style="width:16px; color:#8e8e93;"></i>
                <div style="display:flex; flex-direction:column; align-items:center;">
                    <input type="range" id="volSlide" min="0" max="100" value="100" style="width:80px;">
                    <span id="volLvl" style="font-size:9px; color:var(--accent-color); font-weight:700;">100%</span>
                </div>
                <div style="display:flex; gap:10px; background:rgba(255,255,255,0.05); padding:6px 12px; border-radius:15px;">
                    <div style="text-align:center;">
                        <span style="font-size:8px; display:block; color:#8e8e93;">BASS</span>
                        <input type="range" id="bssSlide" min="0" max="25" value="0" style="width:40px;">
                    </div>
                    <div style="text-align:center;">
                        <span style="font-size:8px; display:block; color:#8e8e93;">BOOST</span>
                        <input type="range" id="bstSlide" min="1" max="5" step="0.5" value="1" style="width:40px;">
                    </div>
                </div>
            </div>
        </footer>

        <!-- Mobile Nav -->
        <nav class="mobile-nav">
            <a href="#" class="nav-item-m active" data-view="home"><i data-lucide="play-circle"></i><span>Listen</span></a>
            <a href="#" class="nav-item-m" data-view="browse"><i data-lucide="layout-grid"></i><span>Browse</span></a>
            <a href="#" class="nav-item-m" data-view="search"><i data-lucide="search"></i><span>Search</span></a>
        </nav>
    </div>

    <div id="yt-hidden-player" style="position:fixed; top:-999px;"></div>
    <script src="main.js"></script>
    <div class="dynamic-bg" style="position:fixed; inset:0; z-index:-1; opacity:0.1; background:#000;"></div>
</body>
</html>
