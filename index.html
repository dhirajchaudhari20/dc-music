<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DC MUSIC - Spotify Experience</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
</head>
<body>
    <!-- Spotify Style Welcome Overlay -->
    <div id="welcomeOverlay" class="welcome-overlay">
        <div class="welcome-card">
            <div class="nano-logo" style="width:80px; height:80px; font-size:32px; margin:0 auto 32px">DC</div>
            <h1>Millions of songs.<br>Free on DC Music.</h1>
            <button class="auth-btn google" onclick="googleSignIn()">LOG IN WITH GOOGLE</button>
            <button class="auth-btn guest" onclick="closeWelcome()">CONTINUE AS GUEST</button>
        </div>
    </div>

    <div id="app" class="app-container">
        <!-- Spotify Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="nano-logo">DC</div>
                <span>MUSIC</span>
            </div>
            
            <nav class="nav-group">
                <a href="#" class="nav-item active" data-view="home"><i data-lucide="home"></i> Home</a>
                <a href="#" class="nav-item" data-view="search"><i data-lucide="search"></i> Search</a>
                <a href="#" class="nav-item" data-view="library"><i data-lucide="library"></i> Your Library</a>
            </nav>

            <nav class="nav-group">
                <p>Playlists</p>
                <a href="#" class="nav-item" id="createPlaylist"><i data-lucide="plus-square"></i> Create Playlist</a>
                <a href="#" class="nav-item" id="likedSongs"><i data-lucide="heart" style="fill: #1DB954; color: #1DB954"></i> Liked Songs</a>
                <a href="#" class="nav-item" id="automixBtn"><i data-lucide="zap"></i> AI Automix</a>
            </nav>

            <div style="margin-top: auto; padding-top: 20px;">
                <div id="userProfile" style="display:flex; align-items:center; gap:12px;">
                    <div style="width:28px; height:28px; background:#282828; border-radius:50%; display:flex; align-items:center; justify-content:center;">
                        <i data-lucide="user" style="width:16px;"></i>
                    </div>
                    <span id="userName" style="font-size:13px; font-weight:700;">Guest User</span>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <section id="content-area">
                <!-- Home Content gets rendered here -->
            </section>
        </main>

        <!-- Bottom Player Bar -->
        <footer class="player-bar">
            <div class="now-playing">
                <img id="currentArt" src="https://i.ytimg.com/vi/4NRXx6U8ABQ/mqdefault.jpg">
                <div class="track-info">
                    <h4 id="currentTitle">Not Playing</h4>
                    <p id="currentArtist">Select a track</p>
                </div>
                <button id="likeBtn" style="background:none; border:none; margin-left:16px; cursor:pointer;"><i data-lucide="heart" style="width:18px; color:#b3b3b3"></i></button>
            </div>

            <div class="player-controls">
                <div class="control-btns">
                    <button class="icon-btn" style="background:none; border:none; cursor:pointer;"><i data-lucide="shuffle" style="width:16px; color:#b3b3b3"></i></button>
                    <button id="prevBtn" class="icon-btn" style="background:none; border:none; cursor:pointer;"><i data-lucide="skip-back" style="width:20px; color:white"></i></button>
                    <button class="play-btn" id="playPauseBtn"><i data-lucide="play" style="fill:black"></i></button>
                    <button id="nextBtn" class="icon-btn" style="background:none; border:none; cursor:pointer;"><i data-lucide="skip-forward" style="width:20px; color:white"></i></button>
                    <button class="icon-btn" style="background:none; border:none; cursor:pointer;"><i data-lucide="repeat" style="width:16px; color:#b3b3b3"></i></button>
                </div>
                <div class="prog-container">
                    <span id="curTime">0:00</span>
                    <div class="prog-wrapper">
                        <div id="progFill"></div>
                        <input type="range" id="progBar" min="0" max="100" value="0">
                    </div>
                    <span id="durTime">0:00</span>
                </div>
            </div>

            <div class="audio-engine">
                <div class="gain-pill" id="volLvl">100% Boost</div>
                <div class="vol-group">
                    <i data-lucide="volume-2" style="width:16px; color:#b3b3b3"></i>
                    <div class="prog-wrapper" style="width:80px;">
                         <div id="volFill" style="background:white; height:100%; width:100%; border-radius:2px;"></div>
                         <input type="range" id="volSlide" min="0" max="100" value="100" style="position:absolute; width:100%; height:100%; opacity:0; cursor:pointer; z-index:2;">
                    </div>
                </div>
                <!-- Controls hidden in menu usually, but accessible via main JS -->
                <input type="range" id="bstSlide" min="1" max="15" value="1" style="display:none">
                <input type="range" id="bssSlide" min="0" max="40" value="0" style="display:none">
            </div>
        </footer>

        <!-- Mobile Spotify Nav -->
        <nav class="mobile-nav">
            <a href="#" class="nav-m-item active" data-view="home"><i data-lucide="home"></i><span>Home</span></a>
            <a href="#" class="nav-m-item" data-view="search"><i data-lucide="search"></i><span>Search</span></a>
            <a href="#" class="nav-m-item" data-view="library"><i data-lucide="library"></i><span>Your Library</span></a>
            <a href="#" class="nav-m-item" id="premiumBtn"><i data-lucide="zap"></i><span>Premium</span></a>
        </nav>
    </div>

    <div id="yt-hidden-player" style="position:fixed; top:-999px;"></div>
    <div class="dynamic-bg" id="dynamicBg"></div>
    <script src="main.js"></script>
</body>
</html>
