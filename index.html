<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DC MUSIC - Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
</head>
<body>
    <!-- Premium Welcome Screen (Full Takeover) -->
    <div id="welcomeOverlay" class="welcome-overlay">
        <div class="welcome-card">
            <div class="nano-logo">DC</div>
            <h1>Premium Sound.</h1>
            <p>Experience high-bass, cloud-synced music with our advanced DSA recommendation engine.</p>
            <div class="auth-buttons" style="margin-top:40px;">
                <button class="auth-btn google" onclick="googleSignIn()">
                    <i data-lucide="log-in"></i> Sign in with Google
                </button>
                <button class="auth-btn guest" onclick="closeWelcome()" style="background: rgba(255,255,255,0.05); color:white; border:none; padding:15px; border-radius:15px; cursor:pointer; width:100%; font-weight:700;">
                    Continue as Guest
                </button>
            </div>
        </div>
    </div>

    <div id="app" class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="nano-logo">DC</div>
                <span>MUSIC</span>
            </div>
            
            <nav class="nav-links">
                <p class="nav-label">FOR YOU</p>
                <a href="#" class="nav-item active" data-view="home"><i data-lucide="play-circle"></i> Listen Now</a>
                <a href="#" class="nav-item" data-view="library"><i data-lucide="library"></i> Library</a>
                <a href="#" class="nav-item" id="automixBtn"><i data-lucide="zap"></i> Automix AI</a>
            </nav>

            <div class="user-profile-bar">
                <div class="user-profile" id="userProfile">
                    <i data-lucide="user"></i>
                </div>
                <div class="user-text">
                    <p id="userName">Guest User</p>
                    <span>Premium Member</span>
                </div>
            </div>
        </aside>

        <!-- Main -->
        <main class="main-content">
            <header class="main-header">
                <div class="pill-search">
                    <i data-lucide="search"></i>
                    <input type="text" placeholder="Artists, Songs, Lyrics" id="topSearch">
                </div>
            </header>
            
            <section id="content-area">
                <!-- Content gets injected here -->
            </section>
        </main>

        <!-- Player -->
        <footer class="player-bar">
            <div class="now-playing">
                <img id="currentArt" src="https://i.ytimg.com/vi/4NRXx6U8ABQ/mqdefault.jpg">
                <div class="track-info">
                    <h4 id="currentTitle">Not Playing</h4>
                    <p id="currentArtist">Select music to start</p>
                </div>
                <button id="likeBtn" class="icon-btn" style="background:none; border:none; margin-left:15px; cursor:pointer;"><i data-lucide="heart" style="color:#8e8e93; width:22px;"></i></button>
            </div>

            <div class="player-controls">
                <div class="control-btns">
                    <button id="prevBtn" class="icon-btn" style="background:none; border:none; cursor:pointer;"><i data-lucide="skip-back" style="color:white; width:24px;"></i></button>
                    <button class="play-btn" id="playPauseBtn"><i data-lucide="play"></i></button>
                    <button id="nextBtn" class="icon-btn" style="background:none; border:none; cursor:pointer;"><i data-lucide="skip-forward" style="color:white; width:24px;"></i></button>
                </div>
                <div class="progress-container">
                    <span id="curTime">0:00</span>
                    <div class="prog-wrapper">
                        <div id="progFill"></div>
                        <input type="range" id="progBar" min="0" max="100" value="0">
                    </div>
                    <span id="durTime">0:00</span>
                </div>
            </div>

            <div class="audio-engine">
                <div class="boost-cluster">
                    <div class="boost-unit">
                        <label>BASS</label>
                        <input type="range" id="bssSlide" min="0" max="30" value="0">
                    </div>
                    <div class="boost-unit">
                        <label>BOOST</label>
                        <input type="range" id="bstSlide" min="1" max="10" step="0.5" value="1">
                    </div>
                    <div class="boost-unit" id="volLvl" style="font-size:12px; font-weight:800; min-width:40px;">100%</div>
                </div>
                <div style="display:flex; align-items:center; gap:10px; width:120px;">
                    <i data-lucide="volume-2" style="width:18px; color:#8e8e93"></i>
                    <input type="range" id="volSlide" min="0" max="100" value="100" style="width:100%;">
                </div>
            </div>
        </footer>

        <!-- Mobile Nav -->
        <nav class="mobile-nav">
            <a href="#" class="nav-m-item active" data-view="home"><i data-lucide="play-circle"></i><span>Listen</span></a>
            <a href="#" class="nav-m-item" data-view="library"><i data-lucide="library"></i><span>Library</span></a>
            <a href="#" class="nav-m-item" id="mobileSearchBtn"><i data-lucide="search"></i><span>Search</span></a>
        </nav>
    </div>

    <div id="yt-hidden-player" style="position:fixed; top:-999px;"></div>
    <div class="dynamic-bg" id="dynamicBg"></div>
    <script src="main.js"></script>
</body>
</html>
